<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神的平安 — 給香港弟兄姊妹的安慰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Noto Serif TC', 'PingFang TC', 'Microsoft YaHei', serif;
    background: #0a0a1e;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* === SKY GRADIENT ANIMATION === */
  .sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      #0a0a2e 0%,
      #1a1a3e 30%,
      #2d1b4e 50%,
      #1a1a3e 70%,
      #0a0a1e 100%
    );
    animation: skyTransition 20s ease-in-out infinite;
  }

  @keyframes skyTransition {
    0%, 15% {
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 30%, #2d1b4e 50%, #1a1a3e 70%, #0a0a1e 100%);
    }
    40%, 60% {
      background: linear-gradient(180deg, #1a1040 0%, #3d2060 20%, #6b3060 40%, #c45a30 70%, #e89040 85%, #f0c060 100%);
    }
    80%, 100% {
      background: linear-gradient(180deg, #1a1848 0%, #2a2060 15%, #503070 35%, #805060 55%, #c07040 75%, #e8a050 90%, #f0c870 100%);
    }
  }

  /* === STARS === */
  .stars-container {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  .star:nth-child(1) { top: 8%; left: 15%; animation-delay: 0s; width: 2px; height: 2px; }
  .star:nth-child(2) { top: 12%; left: 45%; animation-delay: 0.5s; }
  .star:nth-child(3) { top: 5%; left: 70%; animation-delay: 1s; width: 2px; height: 2px; }
  .star:nth-child(4) { top: 18%; left: 25%; animation-delay: 1.5s; }
  .star:nth-child(5) { top: 22%; left: 80%; animation-delay: 0.3s; width: 4px; height: 4px; }
  .star:nth-child(6) { top: 3%; left: 55%; animation-delay: 0.8s; }
  .star:nth-child(7) { top: 15%; left: 92%; animation-delay: 1.2s; width: 2px; height: 2px; }
  .star:nth-child(8) { top: 25%; left: 38%; animation-delay: 2s; }
  .star:nth-child(9) { top: 10%; left: 62%; animation-delay: 0.7s; width: 2px; height: 2px; }
  .star:nth-child(10) { top: 20%; left: 10%; animation-delay: 1.8s; }
  .star:nth-child(11) { top: 7%; left: 85%; animation-delay: 0.4s; width: 2px; height: 2px; }
  .star:nth-child(12) { top: 30%; left: 52%; animation-delay: 1.6s; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .star-fade {
    animation: starFade 20s ease-in-out infinite;
  }

  @keyframes starFade {
    0%, 30% { opacity: 1; }
    50%, 70% { opacity: 0; }
    80%, 100% { opacity: 0.5; }
  }

  /* === CLOUDS === */
  .cloud {
    position: absolute;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 50%;
    filter: blur(20px);
    z-index: 2;
  }

  .cloud-1 {
    width: 300px;
    height: 80px;
    top: 25%;
    left: -10%;
    animation: cloudDrift 30s linear infinite;
  }

  .cloud-2 {
    width: 250px;
    height: 60px;
    top: 35%;
    left: -20%;
    animation: cloudDrift 25s linear infinite;
    animation-delay: 5s;
    background: rgba(200, 180, 220, 0.1);
  }

  .cloud-3 {
    width: 350px;
    height: 90px;
    top: 20%;
    left: -15%;
    animation: cloudDrift 35s linear infinite;
    animation-delay: 10s;
  }

  @keyframes cloudDrift {
    0% { transform: translateX(0); opacity: 0.6; }
    25% { opacity: 0.8; }
    50% { opacity: 0.3; transform: translateX(60vw); }
    75% { opacity: 0.1; }
    100% { transform: translateX(100vw); opacity: 0; }
  }

  /* === LIGHT RAYS === */
  .light-rays {
    position: absolute;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 60vw;
    height: 70vh;
    z-index: 3;
    opacity: 0;
    animation: raysAppear 20s ease-in-out infinite;
  }

  @keyframes raysAppear {
    0%, 35% { opacity: 0; }
    50% { opacity: 0.6; }
    65% { opacity: 0.3; }
    80% { opacity: 0.7; }
    100% { opacity: 0; }
  }

  .ray {
    position: absolute;
    bottom: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, transparent, rgba(255, 200, 100, 0.3), transparent);
    transform-origin: bottom center;
  }

  .ray:nth-child(1) { left: 30%; transform: rotate(-15deg); width: 6px; }
  .ray:nth-child(2) { left: 40%; transform: rotate(-5deg); width: 8px; }
  .ray:nth-child(3) { left: 50%; transform: rotate(0deg); width: 10px; }
  .ray:nth-child(4) { left: 60%; transform: rotate(5deg); width: 8px; }
  .ray:nth-child(5) { left: 70%; transform: rotate(15deg); width: 6px; }

  .ray::after {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(15px);
    opacity: 0.5;
  }

  /* === SUN / DIVINE LIGHT === */
  .divine-light {
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 220, 150, 0.8), rgba(255, 180, 80, 0.3), transparent 70%);
    z-index: 3;
    opacity: 0;
    animation: divinePulse 20s ease-in-out infinite;
  }

  @keyframes divinePulse {
    0%, 35% { opacity: 0; transform: translateX(-50%) scale(0.5); }
    45% { opacity: 0.8; transform: translateX(-50%) scale(1); }
    55% { opacity: 0.5; }
    65% { opacity: 0.9; transform: translateX(-50%) scale(1.1); }
    75% { opacity: 0.6; }
    85% { opacity: 0.8; transform: translateX(-50%) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.8); }
  }

  /* === MOUNTAINS === */
  .mountains {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60%;
    z-index: 5;
  }

  .mountain {
    position: absolute;
    bottom: 0;
    width: 100%;
  }

  .mountain-1 {
    height: 45%;
    background: linear-gradient(180deg, #1a1025, #0d0a15);
    clip-path: polygon(0% 100%, 0% 40%, 15% 60%, 30% 25%, 45% 50%, 55% 15%, 70% 45%, 85% 30%, 100% 55%, 100% 100%);
  }

  .mountain-2 {
    height: 35%;
    background: linear-gradient(180deg, #120e1f, #080610);
    clip-path: polygon(0% 100%, 0% 55%, 20% 35%, 35% 60%, 50% 20%, 65% 50%, 80% 30%, 100% 55%, 100% 100%);
  }

  .mountain-3 {
    height: 25%;
    background: linear-gradient(180deg, #0a0815, #050308);
    clip-path: polygon(0% 100%, 0% 65%, 10% 45%, 25% 60%, 40% 35%, 55% 55%, 70% 40%, 85% 55%, 100% 45%, 100% 100%);
  }

  /* === CROSS === */
  .cross-container {
    position: absolute;
    z-index: 6;
    bottom: 38%;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: crossAppear 20s ease-in-out infinite;
  }

  @keyframes crossAppear {
    0%, 40% { opacity: 0; transform: translateX(-50%) scale(0.8); }
    50% { opacity: 0.9; transform: translateX(-50%) scale(1); }
    60% { opacity: 0.6; }
    70% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    80% { opacity: 0.8; }
    90% { opacity: 0.95; }
    100% { opacity: 0; transform: translateX(-50%) scale(0.9); }
  }

  .cross {
    position: relative;
    width: 6px;
    height: 50px;
  }

  .cross::before {
    content: '';
    position: absolute;
    top: 10px;
    left: -17px;
    width: 40px;
    height: 6px;
    border-radius: 2px;
    background: linear-gradient(90deg, rgba(255, 220, 150, 0.6), rgba(255, 200, 100, 0.9), rgba(255, 220, 150, 0.6));
    box-shadow: 0 0 20px rgba(255, 200, 100, 0.5), 0 0 40px rgba(255, 180, 80, 0.3);
  }

  .cross::after {
    content: '';
    position: absolute;
    top: 0;
    left: -3px;
    width: 12px;
    height: 60px;
    border-radius: 2px;
    background: linear-gradient(180deg, rgba(255, 220, 150, 0.8), rgba(255, 200, 100, 0.5));
    box-shadow: 0 0 20px rgba(255, 200, 100, 0.4), 0 0 40px rgba(255, 180, 80, 0.2);
  }

  /* === GROUND / WATER === */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 18%;
    z-index: 7;
    background: linear-gradient(180deg, #0a0815, #050310);
  }

  .water {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .ripple {
    position: absolute;
    width: 200%;
    height: 2px;
    background: linear-gradient(90deg,
      transparent,
      rgba(255, 200, 100, 0.1),
      rgba(255, 220, 150, 0.15),
      rgba(255, 200, 100, 0.1),
      transparent
    );
    animation: rippleMove 8s ease-in-out infinite;
  }

  .ripple:nth-child(1) { bottom: 30%; animation-delay: 0s; }
  .ripple:nth-child(2) { bottom: 50%; animation-delay: 2s; }
  .ripple:nth-child(3) { bottom: 70%; animation-delay: 4s; }
  .ripple:nth-child(4) { bottom: 20%; animation-delay: 1s; opacity: 0.5; }
  .ripple:nth-child(5) { bottom: 60%; animation-delay: 3s; opacity: 0.3; }

  @keyframes rippleMove {
    0%, 100% { transform: translateX(-25%) scaleX(0.8); opacity: 0.3; }
    50% { transform: translateX(-50%) scaleX(1.2); opacity: 0.7; }
  }

  /* === WALKING FIGURE === */
  .figure-container {
    position: absolute;
    z-index: 6;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: figureWalk 20s ease-in-out infinite;
  }

  @keyframes figureWalk {
    0%, 30% { opacity: 0; transform: translateX(-50%) translateX(-30px); }
    45% { opacity: 0.7; transform: translateX(-50%) translateX(0); }
    60% { opacity: 0.5; }
    75% { opacity: 0.8; transform: translateX(-50%) translateX(15px); }
    85% { opacity: 0.9; }
    100% { opacity: 0; transform: translateX(-50%) translateX(30px); }
  }

  .figure {
    position: relative;
    width: 12px;
    height: 30px;
  }

  /* Head */
  .figure::before {
    content: '';
    position: absolute;
    top: 0;
    left: 2px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 220, 180, 0.7);
    box-shadow: 0 0 10px rgba(255, 200, 150, 0.4);
  }

  /* Body */
  .figure::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 2px;
    width: 8px;
    height: 18px;
    border-radius: 4px 4px 2px 2px;
    background: rgba(200, 180, 160, 0.5);
  }

  /* === WARM PARTICLES === */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 4;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 200, 100, 0.6);
    animation: floatUp 10s ease-in-out infinite;
    opacity: 0;
  }

  .particle:nth-child(1) { left: 20%; bottom: 20%; width: 4px; height: 4px; animation-delay: 8s; }
  .particle:nth-child(2) { left: 35%; bottom: 30%; width: 3px; height: 3px; animation-delay: 10s; }
  .particle:nth-child(3) { left: 50%; bottom: 25%; width: 5px; height: 5px; animation-delay: 12s; }
  .particle:nth-child(4) { left: 65%; bottom: 35%; width: 3px; height: 3px; animation-delay: 14s; }
  .particle:nth-child(5) { left: 45%; bottom: 40%; width: 4px; height: 4px; animation-delay: 16s; }
  .particle:nth-child(6) { left: 55%; bottom: 15%; width: 2px; height: 2px; animation-delay: 9s; }
  .particle:nth-child(7) { left: 30%; bottom: 45%; width: 3px; height: 3px; animation-delay: 11s; }
  .particle:nth-child(8) { left: 70%; bottom: 20%; width: 4px; height: 4px; animation-delay: 13s; }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 0.8; }
    80% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-200px) scale(1.5); }
  }

  /* === TEXT CONTENT === */
  .text-overlay {
    position: relative;
    z-index: 20;
    max-width: 700px;
    padding: 2rem;
    text-align: center;
    color: #f0e6d3;
  }

  .greeting {
    font-size: clamp(1rem, 2.5vmin, 1.3rem);
    color: rgba(240, 230, 211, 0.7);
    margin-bottom: 1.5rem;
    line-height: 2;
    opacity: 0;
    animation: textFadeIn 3s ease-out forwards;
    animation-delay: 1s;
  }

  .verse {
    font-size: clamp(0.95rem, 2vmin, 1.15rem);
    font-weight: 600;
    color: #ffe8b0;
    margin: 1.8rem 0;
    padding: 1.2rem 1.5rem;
    border-left: 3px solid rgba(255, 200, 100, 0.4);
    background: rgba(255, 200, 100, 0.05);
    border-radius: 0 8px 8px 0;
    line-height: 2.2;
    text-shadow: 0 0 20px rgba(255, 200, 100, 0.2);
  }

  .verse-1 {
    opacity: 0;
    animation: textFadeIn 3s ease-out forwards;
    animation-delay: 4s;
  }

  .verse-ref {
    display: block;
    font-size: 0.85em;
    font-weight: 400;
    color: rgba(255, 220, 150, 0.6);
    margin-top: 0.5rem;
  }

  .verse-2 {
    opacity: 0;
    animation: textFadeIn 3s ease-out forwards;
    animation-delay: 7s;
  }

  .verse-3 {
    opacity: 0;
    animation: textFadeIn 3s ease-out forwards;
    animation-delay: 10s;
  }

  .closing {
    font-size: clamp(0.9rem, 1.8vmin, 1.05rem);
    color: rgba(240, 230, 211, 0.8);
    line-height: 2.2;
    margin-top: 1.5rem;
    opacity: 0;
    animation: textFadeIn 3s ease-out forwards;
    animation-delay: 13s;
  }

  .amen {
    display: inline-block;
    font-size: clamp(1.2rem, 3vmin, 1.6rem);
    font-weight: 700;
    color: #ffe8b0;
    margin-top: 2rem;
    letter-spacing: 0.5em;
    opacity: 0;
    animation: amenGlow 3s ease-out forwards, amenPulse 4s ease-in-out infinite;
    animation-delay: 16s, 19s;
    text-shadow: 0 0 30px rgba(255, 200, 100, 0.6), 0 0 60px rgba(255, 180, 80, 0.3);
  }

  @keyframes textFadeIn {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes amenGlow {
    0% { opacity: 0; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes amenPulse {
    0%, 100% { text-shadow: 0 0 30px rgba(255, 200, 100, 0.6), 0 0 60px rgba(255, 180, 80, 0.3); }
    50% { text-shadow: 0 0 50px rgba(255, 200, 100, 0.9), 0 0 100px rgba(255, 180, 80, 0.5), 0 0 150px rgba(255, 150, 50, 0.2); }
  }

  /* === DOVE === */
  .dove-container {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    opacity: 0;
    animation: doveFly 20s ease-in-out infinite;
  }

  @keyframes doveFly {
    0%, 50% { opacity: 0; }
    55% { opacity: 0.8; transform: translateX(-50%) translateY(0); }
    65% { opacity: 0.6; transform: translateX(-40%) translateY(-20px); }
    75% { opacity: 0.7; transform: translateX(-30%) translateY(-10px); }
    85% { opacity: 0.4; transform: translateX(-20%) translateY(-30px); }
    100% { opacity: 0; }
  }

  .dove {
    position: relative;
    width: 40px;
    height: 20px;
  }

  .dove-body {
    position: absolute;
    width: 20px;
    height: 10px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 50% 50% 50% 50%;
    top: 8px;
    left: 10px;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
  }

  .dove-wing-l {
    position: absolute;
    width: 18px;
    height: 12px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 50% 50% 0 50%;
    top: 2px;
    left: 12px;
    animation: wingFlapL 2s ease-in-out infinite;
    transform-origin: bottom right;
  }

  .dove-wing-r {
    position: absolute;
    width: 18px;
    height: 12px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 50% 50% 50% 0;
    top: 2px;
    left: 22px;
    animation: wingFlapR 2s ease-in-out infinite;
    transform-origin: bottom left;
  }

  @keyframes wingFlapL {
    0%, 100% { transform: rotate(-20deg); }
    50% { transform: rotate(20deg); }
  }

  @keyframes wingFlapR {
    0%, 100% { transform: rotate(20deg); }
    50% { transform: rotate(-20deg); }
  }

  .dove-tail {
    position: absolute;
    width: 10px;
    height: 6px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 0 50% 50% 0;
    top: 10px;
    left: 0;
  }

  /* === ORNAMENTAL DIVIDERS === */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255, 200, 100, 0.5), transparent);
    margin: 1.5rem auto;
    opacity: 0;
  }

  .divider-1 { animation: textFadeIn 2s ease-out forwards; animation-delay: 6.5s; }
  .divider-2 { animation: textFadeIn 2s ease-out forwards; animation-delay: 9.5s; }
  .divider-3 { animation: textFadeIn 2s ease-out forwards; animation-delay: 12.5s; }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    .text-overlay {
      padding: 1rem;
      max-width: 95vw;
    }

    .verse {
      padding: 0.8rem 1rem;
      margin: 1.2rem 0;
    }

    .cross {
      height: 35px;
    }

    .cross::before {
      top: 6px;
      left: -12px;
      width: 28px;
      height: 4px;
    }

    .cross::after {
      top: 0;
      left: -2px;
      width: 8px;
      height: 42px;
    }
  }

  /* === ATMOSPHERIC GLOW === */
  .atmosphere {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(
      ellipse at 50% 30%,
      rgba(255, 200, 100, 0) 0%,
      transparent 60%
    );
    animation: atmospherePulse 20s ease-in-out infinite;
  }

  @keyframes atmospherePulse {
    0%, 35% { background: radial-gradient(ellipse at 50% 30%, transparent 0%, transparent 60%); }
    50% { background: radial-gradient(ellipse at 50% 30%, rgba(255, 200, 100, 0.1) 0%, transparent 60%); }
    65% { background: radial-gradient(ellipse at 50% 30%, rgba(255, 180, 80, 0.08) 0%, transparent 50%); }
    80% { background: radial-gradient(ellipse at 50% 30%, rgba(255, 200, 100, 0.12) 0%, transparent 65%); }
    100% { background: radial-gradient(ellipse at 50% 30%, transparent 0%, transparent 60%); }
  }

  /* Subtle vignette */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 15;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="scene">
    <!-- Sky -->
    <div class="sky"></div>
    <div class="atmosphere"></div>

    <!-- Stars -->
    <div class="stars-container">
      <div class="star star-fade" style="top:8%;left:15%"></div>
      <div class="star star-fade" style="top:12%;left:45%;animation-delay:0.5s"></div>
      <div class="star star-fade" style="top:5%;left:70%;animation-delay:1s;width:2px;height:2px"></div>
      <div class="star star-fade" style="top:18%;left:25%;animation-delay:1.5s"></div>
      <div class="star star-fade" style="top:22%;left:80%;animation-delay:0.3s;width:4px;height:4px"></div>
      <div class="star star-fade" style="top:3%;left:55%;animation-delay:0.8s"></div>
      <div class="star star-fade" style="top:15%;left:92%;animation-delay:1.2s;width:2px;height:2px"></div>
      <div class="star star-fade" style="top:25%;left:38%;animation-delay:2s"></div>
      <div class="star star-fade" style="top:10%;left:62%;animation-delay:0.7s;width:2px;height:2px"></div>
      <div class="star star-fade" style="top:20%;left:10%;animation-delay:1.8s"></div>
      <div class="star star-fade" style="top:7%;left:85%;animation-delay:0.4s;width:2px;height:2px"></div>
      <div class="star star-fade" style="top:30%;left:52%;animation-delay:1.6s"></div>
    </div>

    <!-- Clouds -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- Divine Light -->
    <div class="divine-light"></div>

    <!-- Light Rays -->
    <div class="light-rays">
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>

      <p class="greeting">親愛的弟兄姊妹，讀到你為香港社會的點滴變化而感慨，我深表理解。<br>長者需要、疫情記憶、住屋與醫務改革，都是我們這世代共同背負的重量。</p>

      <div class="verse verse-1">

        <span class="verse-ref">— 詩篇 23:4</span>
      </div>

      <div class="divider divider-1"></div>

      <div class="verse verse-2">

      </div>

      <div class="divider divider-2"></div>

      <p class="closing">願你在為社區的期盼中不被焦慮吞噬。</p>

      <div class="verse verse-3">

        <span class="verse-ref">— 馬太福音 11:28</span>
      </div>

      <div class="divider divider-3"></div>

      <p class="closing">
        香港正慢慢調適，正如神在曠野開道路。<br>
        讓我們憑信心等候，因祂必賜下出人意外的平安與確定的盼望。
      </p>
