<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在變遷中安息 — 神的信實永不改變</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', 'Noto Serif SC', serif;
  }

  .scene {
    position: relative;
    width: 100vmin;
    height: 100vmin;
    overflow: hidden;
    border-radius: 12px;
  }

  /* === SKY === */
  .sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      #0a0e2a 0%,
      #1a1f4e 20%,
      #2d1b69 40%,
      #4a2c6e 55%,
      #6b3a6e 65%,
      #8b4a5e 75%,
      #c4654a 85%,
      #e8944a 92%,
      #f0c060 100%
    );
    background-size: 100% 300%;
    animation: skyDawn 12s ease-in-out forwards;
  }

  @keyframes skyDawn {
    0% { background-position: 0% 100%; }
    100% { background-position: 0% 0%; }
  }

  /* === STARS === */
  .stars {
    position: absolute;
    inset: 0;
    animation: starsFade 12s ease-in-out forwards;
  }

  @keyframes starsFade {
    0% { opacity: 1; }
    60% { opacity: 0.3; }
    100% { opacity: 0; }
  }

  .star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite alternate;
  }

  .star:nth-child(1) { top: 8%; left: 15%; animation-delay: 0s; }
  .star:nth-child(2) { top: 5%; left: 45%; animation-delay: 0.3s; width: 2px; height: 2px; }
  .star:nth-child(3) { top: 12%; left: 72%; animation-delay: 0.6s; }
  .star:nth-child(4) { top: 3%; left: 82%; animation-delay: 0.9s; width: 2px; height: 2px; }
  .star:nth-child(5) { top: 18%; left: 30%; animation-delay: 1.2s; }
  .star:nth-child(6) { top: 10%; left: 58%; animation-delay: 0.4s; width: 2px; height: 2px; }
  .star:nth-child(7) { top: 22%; left: 88%; animation-delay: 0.7s; }
  .star:nth-child(8) { top: 6%; left: 65%; animation-delay: 1s; width: 2px; height: 2px; }
  .star:nth-child(9) { top: 15%; left: 10%; animation-delay: 0.2s; }
  .star:nth-child(10) { top: 20%; left: 50%; animation-delay: 0.8s; width: 2px; height: 2px; }
  .star:nth-child(11) { top: 4%; left: 25%; animation-delay: 1.1s; }
  .star:nth-child(12) { top: 16%; left: 95%; animation-delay: 0.5s; width: 2px; height: 2px; }

  @keyframes twinkle {
    0% { opacity: 0.4; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.3); }
  }

  /* === LIGHT RAYS === */
  .light-rays {
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vmin;
    height: 60vmin;
    opacity: 0;
    animation: raysAppear 12s ease-in-out forwards;
    animation-delay: 4s;
  }

  @keyframes raysAppear {
    0%, 50% { opacity: 0; }
    100% { opacity: 0.6; }
  }

  .ray {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 4vmin;
    height: 100%;
    transform-origin: bottom center;
    background: linear-gradient(
      0deg,
      rgba(255, 210, 100, 0.4) 0%,
      rgba(255, 200, 80, 0.1) 40%,
      transparent 100%
    );
    filter: blur(3px);
  }

  .ray:nth-child(1) { transform: translateX(-50%) rotate(-35deg); width: 3vmin; animation: rayPulse 4s ease-in-out infinite; }
  .ray:nth-child(2) { transform: translateX(-50%) rotate(-20deg); width: 5vmin; animation: rayPulse 4s ease-in-out infinite 0.5s; }
  .ray:nth-child(3) { transform: translateX(-50%) rotate(-5deg); width: 6vmin; animation: rayPulse 4s ease-in-out infinite 1s; }
  .ray:nth-child(4) { transform: translateX(-50%) rotate(10deg); width: 5vmin; animation: rayPulse 4s ease-in-out infinite 1.5s; }
  .ray:nth-child(5) { transform: translateX(-50%) rotate(25deg); width: 3vmin; animation: rayPulse 4s ease-in-out infinite 2s; }

  @keyframes rayPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* === CLOUDS === */
  .cloud {
    position: absolute;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    filter: blur(20px);
  }

  .cloud::before,
  .cloud::after {
    content: '';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }

  .cloud-1 {
    top: 30%;
    left: -10%;
    width: 25vmin;
    height: 8vmin;
    animation: cloudDrift 20s ease-in-out infinite;
  }
  .cloud-1::before { width: 15vmin; height: 12vmin; top: -6vmin; left: 4vmin; }
  .cloud-1::after { width: 12vmin; height: 10vmin; top: -4vmin; left: 12vmin; }

  .cloud-2 {
    top: 40%;
    right: -15%;
    width: 30vmin;
    height: 10vmin;
    animation: cloudDriftReverse 25s ease-in-out infinite;
    background: rgba(200, 160, 120, 0.12);
  }
  .cloud-2::before { width: 18vmin; height: 14vmin; top: -8vmin; left: 5vmin; }
  .cloud-2::after { width: 14vmin; height: 11vmin; top: -5vmin; left: 14vmin; }

  .cloud-3 {
    top: 50%;
    left: 20%;
    width: 20vmin;
    height: 6vmin;
    animation: cloudFloat 18s ease-in-out infinite;
    background: rgba(255, 220, 160, 0.1);
  }
  .cloud-3::before { width: 12vmin; height: 10vmin; top: -5vmin; left: 3vmin; }
  .cloud-3::after { width: 10vmin; height: 8vmin; top: -3vmin; left: 9vmin; }

  @keyframes cloudDrift {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(30vmin); }
  }

  @keyframes cloudDriftReverse {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-25vmin); }
  }

  @keyframes cloudFloat {
    0%, 100% { transform: translateX(0) translateY(0); opacity: 0.6; }
    50% { transform: translateX(15vmin) translateY(-3vmin); opacity: 1; }
  }

  /* === CROSS === */
  .cross-container {
    position: absolute;
    bottom: 32%;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: crossReveal 12s ease-in-out forwards;
    animation-delay: 3s;
  }

  @keyframes crossReveal {
    0%, 30% { opacity: 0; transform: translateX(-50%) translateY(10vmin); }
    60% { opacity: 0.9; }
    100% { opacity: 0.85; transform: translateX(-50%) translateY(0); }
  }

  .cross {
    position: relative;
    width: 2.5vmin;
    height: 14vmin;
    background: linear-gradient(180deg, #f5e6c8 0%, #d4a86a 50%, #b8864a 100%);
    border-radius: 2px;
    box-shadow:
      0 0 20px rgba(255, 200, 100, 0.4),
      0 0 60px rgba(255, 180, 80, 0.2),
      0 0 100px rgba(255, 160, 60, 0.1);
  }

  .cross::before {
    content: '';
    position: absolute;
    top: 3.5vmin;
    left: -4vmin;
    width: 10.5vmin;
    height: 2.2vmin;
    background: linear-gradient(90deg, #b8864a, #d4a86a, #f5e6c8, #d4a86a, #b8864a);
    border-radius: 2px;
    box-shadow:
      0 0 15px rgba(255, 200, 100, 0.3),
      0 0 40px rgba(255, 180, 80, 0.15);
  }

  .cross-glow {
    position: absolute;
    top: -8vmin;
    left: -12vmin;
    width: 26.5vmin;
    height: 30vmin;
    background: radial-gradient(ellipse, rgba(255, 210, 120, 0.15) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* === GROUND / HILLS === */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35%;
    background: linear-gradient(180deg, #1a2a1a 0%, #0d1a0d 100%);
    border-radius: 50% 50% 0 0 / 8% 8% 0 0;
    z-index: 2;
  }

  .ground::before {
    content: '';
    position: absolute;
    bottom: 15%;
    left: -5%;
    width: 40%;
    height: 12%;
    background: #152015;
    border-radius: 50%;
    filter: blur(2px);
  }

  .ground::after {
    content: '';
    position: absolute;
    bottom: 10%;
    right: -5%;
    width: 35%;
    height: 10%;
    background: #152015;
    border-radius: 50%;
    filter: blur(2px);
  }

  /* === OCEAN / WAVES === */
  .ocean {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 20%;
    z-index: 3;
    overflow: hidden;
  }

  .wave {
    position: absolute;
    width: 200%;
    height: 100%;
    border-radius: 40%;
  }

  .wave-1 {
    bottom: -30%;
    left: -50%;
    background: rgba(30, 60, 90, 0.5);
    animation: waveMove1 8s ease-in-out infinite;
  }

  .wave-2 {
    bottom: -35%;
    left: -30%;
    background: rgba(20, 50, 80, 0.4);
    animation: waveMove2 10s ease-in-out infinite;
  }

  .wave-3 {
    bottom: -40%;
    left: -40%;
    background: rgba(40, 70, 100, 0.3);
    animation: waveMove3 12s ease-in-out infinite;
  }

  @keyframes waveMove1 {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    50% { transform: translateX(10%) rotate(1deg); }
  }

  @keyframes waveMove2 {
    0%, 100% { transform: translateX(5%) rotate(-1deg); }
    50% { transform: translateX(-8%) rotate(0.5deg); }
  }

  @keyframes waveMove3 {
    0%, 100% { transform: translateX(-5%) rotate(0.5deg); }
    50% { transform: translateX(7%) rotate(-0.5deg); }
  }

  /* === DOVE === */
  .dove {
    position: absolute;
    top: 22%;
    left: 50%;
    opacity: 0;
    animation: doveFly 12s ease-in-out forwards;
    animation-delay: 6s;
    z-index: 5;
  }

  @keyframes doveFly {
    0% { opacity: 0; transform: translate(-50%, 5vmin) scale(0.5); }
    20% { opacity: 0.9; transform: translate(-50%, 0) scale(1); }
    50% { transform: translate(-30%, -2vmin) scale(1); }
    80% { opacity: 0.9; }
    100% { opacity: 0; transform: translate(10%, -5vmin) scale(0.8); }
  }

  .dove-body {
    position: relative;
    width: 6vmin;
    height: 3vmin;
    background: #f0ead6;
    border-radius: 50% 40% 40% 50%;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
  }

  .dove-body::before {
    content: '';
    position: absolute;
    top: -2.5vmin;
    left: 1.5vmin;
    width: 3vmin;
    height: 4vmin;
    background: #f0ead6;
    border-radius: 50% 50% 0 50%;
    transform: rotate(-30deg);
    transform-origin: bottom left;
    animation: wingFlap 1.5s ease-in-out infinite;
  }

  .dove-body::after {
    content: '';
    position: absolute;
    top: -2vmin;
    left: 3vmin;
    width: 2.5vmin;
    height: 3.5vmin;
    background: #ece5cf;
    border-radius: 50% 50% 50% 0;
    transform: rotate(20deg);
    transform-origin: bottom left;
    animation: wingFlap2 1.5s ease-in-out infinite;
  }

  .dove-tail {
    position: absolute;
    right: -1.5vmin;
    top: 0.5vmin;
    width: 2.5vmin;
    height: 1.5vmin;
    background: #e8e0cc;
    border-radius: 0 50% 50% 0;
    transform: rotate(-15deg);
  }

  @keyframes wingFlap {
    0%, 100% { transform: rotate(-30deg); }
    50% { transform: rotate(-60deg); }
  }

  @keyframes wingFlap2 {
    0%, 100% { transform: rotate(20deg); }
    50% { transform: rotate(-10deg); }
  }

  /* === PARTICLES === */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255, 220, 150, 0.8);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255, 200, 100, 0.4);
  }

  .particle:nth-child(1) { bottom: 20%; left: 20%; animation: floatUp 6s ease-in-out infinite; }
  .particle:nth-child(2) { bottom: 15%; left: 40%; animation: floatUp 8s ease-in-out infinite 1s; width: 3px; height: 3px; }
  .particle:nth-child(3) { bottom: 25%; left: 60%; animation: floatUp 7s ease-in-out infinite 2s; }
  .particle:nth-child(4) { bottom: 18%; left: 75%; animation: floatUp 9s ease-in-out infinite 0.5s; width: 3px; height: 3px; }
  .particle:nth-child(5) { bottom: 22%; left: 35%; animation: floatUp 6.5s ease-in-out infinite 3s; }
  .particle:nth-child(6) { bottom: 12%; left: 55%; animation: floatUp 7.5s ease-in-out infinite 1.5s; width: 3px; height: 3px; }
  .particle:nth-child(7) { bottom: 30%; left: 48%; animation: floatUp 8.5s ease-in-out infinite 2.5s; }
  .particle:nth-child(8) { bottom: 10%; left: 65%; animation: floatUp 6s ease-in-out infinite 4s; width: 3px; height: 3px; }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    20% { opacity: 1; }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-40vmin) translateX(5vmin); }
  }

  /* === TEXT SECTIONS === */
  .text-layer {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8vmin;
    pointer-events: none;
  }

  .verse-card {
    background: rgba(10, 10, 30, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 210, 130, 0.2);
    border-radius: 16px;
    padding: 4vmin 5vmin;
    max-width: 55vmin;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    pointer-events: auto;
  }

  .verse-card:nth-child(1) {
    animation: textFadeIn 1.5s ease forwards;
    animation-delay: 7s;
  }

  .verse-card:nth-child(2) {
    animation: textFadeIn 1.5s ease forwards;
    animation-delay: 9s;
  }

  .verse-card:nth-child(3) {
    animation: textFadeIn 1.5s ease forwards;
    animation-delay: 11s;
  }

  @keyframes textFadeIn {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .verse-text {
    color: #f5ead6;
    font-size: 2.2vmin;
    line-height: 1.9;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
  }

  .verse-ref {
    color: rgba(255, 210, 130, 0.8);
    font-size: 1.8vmin;
    margin-top: 2vmin;
    font-style: italic;
  }

  .title-text {
    color: #f5e6c8;
    font-size: 3.5vmin;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(255, 200, 100, 0.5), 0 2px 10px rgba(0,0,0,0.5);
    opacity: 0;
    animation: titleReveal 2s ease forwards;
    animation-delay: 5.5s;
    margin-bottom: 3vmin;
  }

  @keyframes titleReveal {
    0% { opacity: 0; letter-spacing: 0.4em; }
    100% { opacity: 1; letter-spacing: 0.15em; }
  }

  .amen-text {
    color: rgba(255, 220, 160, 0.7);
    font-size: 2.5vmin;
    letter-spacing: 0.3em;
    opacity: 0;
    animation: amenFade 2s ease forwards;
    animation-delay: 13s;
    margin-top: 2vmin;
    text-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
  }

  @keyframes amenFade {
    0% { opacity: 0; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* === GENTLE HORIZONTAL LIGHT BAND === */
  .horizon-glow {
    position: absolute;
    bottom: 28%;
    left: 0;
    right: 0;
    height: 8%;
    background: linear-gradient(90deg, transparent, rgba(255, 180, 80, 0.15), rgba(255, 200, 120, 0.25), rgba(255, 180, 80, 0.15), transparent);
    filter: blur(8px);
    opacity: 0;
    animation: horizonPulse 6s ease-in-out infinite;
    animation-delay: 4s;
  }

  @keyframes horizonPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* === SHIELD OF FAITH (decorative circle) === */
  .shield {
    position: absolute;
    bottom: 35%;
    left: 50%;
    transform: translateX(-50%);
    width: 18vmin;
    height: 18vmin;
    border: 2px solid rgba(255, 210, 130, 0.15);
    border-radius: 50%;
    opacity: 0;
    animation: shieldAppear 12s ease-in-out forwards;
    animation-delay: 3.5s;
    z-index: 1;
  }

  .shield::before {
    content: '';
    position: absolute;
    inset: -1vmin;
    border: 1px solid rgba(255, 210, 130, 0.08);
    border-radius: 50%;
  }

  .shield::after {
    content: '';
    position: absolute;
    inset: 2vmin;
    border: 1px solid rgba(255, 210, 130, 0.1);
    border-radius: 50%;
  }

  @keyframes shieldAppear {
    0%, 35% { opacity: 0; }
    100% { opacity: 0.6; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    .verse-text { font-size: 1.6vmin; }
    .verse-ref { font-size: 1.3vmin; }
    .title-text { font-size: 2.5vmin; }
    .amen-text { font-size: 1.8vmin; }
    .verse-card { padding: 3vmin 4vmin; }
  }
</style>
</head>
<body>

<div class="scene">
  <!-- Sky with dawn transition -->
  <div class="sky"></div>

  <!-- Stars fading away -->
  <div class="stars">
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div>
  </div>

  <!-- Light rays from the horizon -->
  <div class="light-rays">
    <div class="ray"></div>
    <div class="ray"></div>
    <div class="ray"></div>
    <div class="ray"></div>
    <div class="ray"></div>
  </div>

  <!-- Clouds -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <!-- Horizon glow -->
  <div class="horizon-glow"></div>

  <!-- Shield of faith -->
  <div class="shield"></div>

  <!-- Cross -->
  <div class="cross-container">
    <div class="cross-glow"></div>
    <div class="cross"></div>
  </div>

  <!-- Dove -->
  <div class="dove">
    <div class="dove-body">
      <div class="dove-tail"></div>
    </div>
  </div>

  <!-- Floating particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Hills -->
  <div class="ground"></div>

  <!-- Ocean waves -->
  <div class="ocean">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <!-- Text Layer -->
  <div class="text-layer">
    <div class="title-text">✝ 在變遷中安息 ✝</div>
    <div class="verse-card">
      <div class="verse-text">
        「耶和華說：你們不要記念從前的事，<br>
        也不要思想古時的事。<br>
        看哪，我要做一件新事！」
      </div>
      <div class="verse-ref">— 以賽亞書 43:18-19</div>
    </div>
    <div class="verse-card">
      <div class="verse-text">
        「你們要休息，要知道我是神！<br>
        每早晨，這都是新的；<br>
        你的信實極其廣大！」
      </div>
      <div class="verse-ref">— 詩篇 46:10 · 耶利米哀歌 3:22-23</div>
    </div>
    <div class="verse-card">
      <div class="verse-text">
        環境雖變，神的信實永不改變。<br>
        願我們更守住與主同行的心。<br>
        祂必在變遷中掌權，賜下出人意外的平安。
      </div>
      <div class="verse-ref">— 羅馬書 8:38-39</div>
    </div>
    <div class="amen-text">阿 -men</div>
  </div>
</div>

</body>
</html>
