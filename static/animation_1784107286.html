<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主賜平安 — 安慰訊息</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Ma+Shan+Zheng&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Noto Serif TC', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    position: relative;
    width: 100vmin;
    height: 100vmin;
    overflow: hidden;
    border-radius: 12px;
  }

  /* === SKY GRADIENT === */
  .sky {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg,
      #0a0e2a 0%,
      #141852 25%,
      #1a2060 40%,
      #2d1b4e 60%,
      #4a1942 75%,
      #6b2040 85%,
      #8b3a2a 95%,
      #c46020 100%
    );
    animation: skyShift 30s ease-in-out infinite;
  }

  @keyframes skyShift {
    0%, 100% {
      background: linear-gradient(180deg,
        #0a0e2a 0%, #141852 25%, #1a2060 40%,
        #2d1b4e 60%, #4a1942 75%, #6b2040 85%, #8b3a2a 95%, #c46020 100%);
    }
    30%, 70% {
      background: linear-gradient(180deg,
        #0d1030 0%, #1a1860 20%, #252070 35%,
        #3a1860 50%, #5a1a50 65%, #7a3040 80%, #a05030 92%, #d07030 100%);
    }
  }

  /* === STARS === */
  .stars {
    position: absolute;
    width: 100%;
    height: 60%;
    top: 0;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  .star:nth-child(1) { top: 8%; left: 15%; animation-delay: 0s; }
  .star:nth-child(2) { top: 12%; left: 45%; animation-delay: 0.5s; width: 3px; height: 3px; }
  .star:nth-child(3) { top: 5%; left: 72%; animation-delay: 1s; }
  .star:nth-child(4) { top: 18%; left: 30%; animation-delay: 1.5s; width: 1px; height: 1px; }
  .star:nth-child(5) { top: 22%; left: 85%; animation-delay: 2s; }
  .star:nth-child(6) { top: 3%; left: 55%; animation-delay: 0.3s; width: 1px; height: 1px; }
  .star:nth-child(7) { top: 15%; left: 92%; animation-delay: 1.2s; }
  .star:nth-child(8) { top: 25%; left: 8%; animation-delay: 0.8s; width: 3px; height: 3px; }
  .star:nth-child(9) { top: 10%; left: 62%; animation-delay: 2.2s; }
  .star:nth-child(10) { top: 20%; left: 50%; animation-delay: 1.8s; width: 1px; height: 1px; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* === CLOUDS === */
  .cloud {
    position: absolute;
    background: rgba(100, 80, 120, 0.3);
    border-radius: 50%;
    filter: blur(20px);
    animation: cloudDrift 30s ease-in-out infinite;
  }

  .cloud:nth-child(1) {
    width: 30%;
    height: 8%;
    top: 15%;
    left: -10%;
    animation-duration: 35s;
  }
  .cloud:nth-child(2) {
    width: 25%;
    height: 6%;
    top: 25%;
    left: -20%;
    animation-duration: 40s;
    animation-delay: 5s;
    background: rgba(80, 60, 100, 0.25);
  }
  .cloud:nth-child(3) {
    width: 35%;
    height: 10%;
    top: 10%;
    left: -15%;
    animation-duration: 45s;
    animation-delay: 10s;
    background: rgba(120, 90, 130, 0.2);
  }

  @keyframes cloudDrift {
    0% { transform: translateX(0); opacity: 0.6; }
    50% { opacity: 0.8; }
    100% { transform: translateX(150%); opacity: 0.3; }
  }

  /* === HONG KONG SKYLINE === */
  .skyline {
    position: absolute;
    bottom: 18%;
    width: 100%;
    height: 35%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .building {
    position: absolute;
    bottom: 0;
    background: linear-gradient(180deg, #1a1a3a 0%, #0d0d2a 100%);
    border-radius: 1px 1px 0 0;
  }

  .building::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 8px,
      rgba(255, 200, 100, 0.15) 8px,
      rgba(255, 200, 100, 0.15) 10px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 6px,
      rgba(255, 200, 100, 0.08) 6px,
      rgba(255, 200, 100, 0.08) 8px
    );
  }

  .b1 { left: 3%; width: 4%; height: 28%; }
  .b2 { left: 7%; width: 3%; height: 22%; }
  .b3 { left: 10%; width: 5%; height: 35%; }
  .b4 { left: 15%; width: 3%; height: 18%; }
  .b5 { left: 18%; width: 6%; height: 42%; }
  .b5::after {
    content: '';
    position: absolute;
    top: -8%;
    left: 30%;
    width: 40%;
    height: 10%;
    background: #1a1a3a;
    border-radius: 50% 50% 0 0;
  }
  .b6 { left: 24%; width: 4%; height: 30%; }
  .b7 { left: 28%; width: 3%; height: 25%; }
  .b8 { left: 31%; width: 5%; height: 38%; }
  .b9 { left: 36%; width: 2%; height: 45%; }
  .b9::before {
    content: '';
    position: absolute;
    top: -12%;
    left: 25%;
    width: 50%;
    height: 15%;
    background: #1a1a3a;
    border-radius: 50% 50% 0 0;
  }
  .b10 { left: 38%; width: 7%; height: 32%; }
  .b11 { left: 45%; width: 3%; height: 20%; }
  .b12 { left: 48%; width: 5%; height: 40%; }
  .b13 { left: 53%; width: 4%; height: 28%; }
  .b14 { left: 57%; width: 6%; height: 36%; }
  .b15 { left: 63%; width: 3%; height: 22%; }
  .b16 { left: 66%; width: 5%; height: 44%; }
  .b16::after {
    content: '';
    position: absolute;
    top: -6%;
    left: 35%;
    width: 30%;
    height: 8%;
    background: #1a1a3a;
    border-radius: 50%;
  }
  .b17 { left: 71%; width: 4%; height: 30%; }
  .b18 { left: 75%; width: 6%; height: 38%; }
  .b19 { left: 81%; width: 3%; height: 24%; }
  .b20 { left: 84%; width: 5%; height: 33%; }
  .b21 { left: 89%; width: 4%; height: 26%; }
  .b22 { left: 93%; width: 5%; height: 20%; }

  /* Window lights on buildings */
  .window-light {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 200, 100, 0.6);
    border-radius: 50%;
    animation: windowFlicker 4s ease-in-out infinite;
  }

  .building .wl1 { top: 15%; left: 20%; animation-delay: 0s; }
  .building .wl2 { top: 30%; left: 60%; animation-delay: 1s; }
  .building .wl3 { top: 50%; left: 35%; animation-delay: 2s; }
  .building .wl4 { top: 65%; left: 70%; animation-delay: 0.5s; }
  .building .wl5 { top: 40%; left: 15%; animation-delay: 1.5s; }

  @keyframes windowFlicker {
    0%, 100% { opacity: 0.3; }
    30%, 70% { opacity: 0.8; }
    50% { opacity: 0.5; }
  }

  /* === VICTORIA HARBOUR === */
  .harbour {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 20%;
    background: linear-gradient(180deg,
      rgba(20, 30, 60, 0.8) 0%,
      rgba(15, 25, 50, 0.9) 50%,
      rgba(10, 20, 40, 1) 100%
    );
    overflow: hidden;
  }

  .harbour::before {
    content: '';
    position: absolute;
    top: 0;
    left: -50%;
    width: 200%;
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      transparent 0%,
      rgba(100, 150, 200, 0.05) 10%,
      transparent 20%
    );
    animation: waveMove 8s linear infinite;
  }

  .harbour::after {
    content: '';
    position: absolute;
    top: 15%;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 200, 100, 0.2) 20%,
      rgba(255, 200, 100, 0.3) 50%,
      rgba(255, 200, 100, 0.2) 80%,
      transparent 100%
    );
    animation: shimmer 4s ease-in-out infinite;
  }

  @keyframes waveMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(50%); }
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.3; transform: scaleX(0.9); }
    50% { opacity: 0.8; transform: scaleX(1); }
  }

  /* === DIVINE LIGHT CENTER === */
  .divine-light {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    z-index: 10;
  }

  .light-core {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background: radial-gradient(circle,
      rgba(255, 240, 200, 1) 0%,
      rgba(255, 200, 100, 0.8) 30%,
      rgba(255, 150, 50, 0.3) 60%,
      transparent 100%
    );
    border-radius: 50%;
    animation: corePulse 4s ease-in-out infinite;
  }

  @keyframes corePulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  /* Light rays */
  .ray {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 120px;
    transform-origin: top center;
    background: linear-gradient(180deg,
      rgba(255, 220, 150, 0.6) 0%,
      transparent 100%
    );
    animation: rayPulse 4s ease-in-out infinite;
  }

  .ray:nth-child(2) { transform: rotate(0deg); animation-delay: 0s; }
  .ray:nth-child(3) { transform: rotate(30deg); animation-delay: 0.3s; }
  .ray:nth-child(4) { transform: rotate(60deg); animation-delay: 0.6s; }
  .ray:nth-child(5) { transform: rotate(90deg); animation-delay: 0.9s; }
  .ray:nth-child(6) { transform: rotate(120deg); animation-delay: 1.2s; }
  .ray:nth-child(7) { transform: rotate(150deg); animation-delay: 1.5s; }
  .ray:nth-child(8) { transform: rotate(180deg); animation-delay: 1.8s; }
  .ray:nth-child(9) { transform: rotate(210deg); animation-delay: 2.1s; }
  .ray:nth-child(10) { transform: rotate(240deg); animation-delay: 2.4s; }
  .ray:nth-child(11) { transform: rotate(270deg); animation-delay: 2.7s; }
  .ray:nth-child(12) { transform: rotate(300deg); animation-delay: 3.0s; }
  .ray:nth-child(13) { transform: rotate(330deg); animation-delay: 3.3s; }

  @keyframes rayPulse {
    0%, 100% { opacity: 0.2; height: 100px; }
    50% { opacity: 0.6; height: 140px; }
  }

  /* === CROSS === */
  .cross {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 11;
  }

  .cross-vertical {
    position: absolute;
    width: 6px;
    height: 50px;
    background: linear-gradient(180deg,
      rgba(255, 240, 200, 0.9) 0%,
      rgba(255, 200, 100, 0.7) 100%
    );
    left: 50%;
    transform: translateX(-50%);
    border-radius: 3px;
    box-shadow: 0 0 15px rgba(255, 200, 100, 0.5),
                0 0 30px rgba(255, 180, 80, 0.3);
    animation: crossGlow 3s ease-in-out infinite;
  }

  .cross-horizontal {
    position: absolute;
    width: 30px;
    height: 6px;
    background: linear-gradient(90deg,
      rgba(255, 240, 200, 0.9) 0%,
      rgba(255, 200, 100, 0.7) 100%
    );
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 3px;
    box-shadow: 0 0 15px rgba(255, 200, 100, 0.5),
                0 0 30px rgba(255, 180, 80, 0.3);
    animation: crossGlow 3s ease-in-out infinite;
  }

  @keyframes crossGlow {
    0%, 100% { box-shadow: 0 0 15px rgba(255, 200, 100, 0.5), 0 0 30px rgba(255, 180, 80, 0.3); }
    50% { box-shadow: 0 0 25px rgba(255, 200, 100, 0.8), 0 0 50px rgba(255, 180, 80, 0.5), 0 0 80px rgba(255, 150, 50, 0.2); }
  }

  /* === DOVE === */
  .dove {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    animation: doveFloat 6s ease-in-out infinite;
  }

  .dove-body {
    position: relative;
    width: 30px;
    height: 16px;
    background: rgba(255, 250, 240, 0.9);
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 10px rgba(255, 250, 240, 0.4);
  }

  .dove-head {
    position: absolute;
    top: -6px;
    right: -4px;
    width: 12px;
    height: 12px;
    background: rgba(255, 250, 240, 0.9);
    border-radius: 50%;
  }

  .dove-beak {
    position: absolute;
    top: -2px;
    right: -8px;
    width: 0;
    height: 0;
    border-left: 5px solid rgba(255, 200, 100, 0.8);
    border-top: 2px solid transparent;
    border-bottom: 2px solid transparent;
  }

  .dove-wing-l {
    position: absolute;
    top: -10px;
    left: 5px;
    width: 18px;
    height: 12px;
    background: rgba(255, 250, 240, 0.7);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom right;
    animation: wingFlapL 2s ease-in-out infinite;
  }

  .dove-wing-r {
    position: absolute;
    top: -10px;
    right: 5px;
    width: 18px;
    height: 12px;
    background: rgba(255, 250, 240, 0.7);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom left;
    animation: wingFlapR 2s ease-in-out infinite;
  }

  .dove-tail {
    position: absolute;
    top: 2px;
    left: -8px;
    width: 0;
    height: 0;
    border-top: 4px solid transparent;
    border-right: 8px solid rgba(255, 250, 240, 0.6);
    border-bottom: 4px solid transparent;
  }

  @keyframes doveFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-8px); }
  }

  @keyframes wingFlapL {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(-25deg); }
  }

  @keyframes wingFlapR {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(25deg); }
  }

  /* === GOLDEN PARTICLES === */
  .particles {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: radial-gradient(circle, rgba(255, 220, 130, 0.9), transparent);
    border-radius: 50%;
    animation: floatUp 8s ease-in-out infinite;
  }

  .particle:nth-child(1) { left: 20%; bottom: 20%; animation-delay: 0s; animation-duration: 7s; }
  .particle:nth-child(2) { left: 35%; bottom: 25%; animation-delay: 1s; animation-duration: 9s; width: 3px; height: 3px; }
  .particle:nth-child(3) { left: 50%; bottom: 15%; animation-delay: 2s; animation-duration: 8s; }
  .particle:nth-child(4) { left: 65%; bottom: 22%; animation-delay: 0.5s; animation-duration: 10s; width: 5px; height: 5px; }
  .particle:nth-child(5) { left: 75%; bottom: 18%; animation-delay: 3s; animation-duration: 7.5s; }
  .particle:nth-child(6) { left: 42%; bottom: 30%; animation-delay: 1.5s; animation-duration: 8.5s; width: 3px; height: 3px; }
  .particle:nth-child(7) { left: 55%; bottom: 28%; animation-delay: 2.5s; animation-duration: 9.5s; }
  .particle:nth-child(8) { left: 28%; bottom: 35%; animation-delay: 0.8s; animation-duration: 7.2s; width: 2px; height: 2px; }
  .particle:nth-child(9) { left: 70%; bottom: 32%; animation-delay: 3.5s; animation-duration: 8.8s; }
  .particle:nth-child(10) { left: 48%; bottom: 20%; animation-delay: 4s; animation-duration: 9.2s; width: 3px; height: 3px; }
  .particle:nth-child(11) { left: 15%; bottom: 28%; animation-delay: 1.2s; animation-duration: 7.8s; }
  .particle:nth-child(12) { left: 82%; bottom: 25%; animation-delay: 2.8s; animation-duration: 8.3s; width: 2px; height: 2px; }

  @keyframes floatUp {
    0% {
      transform: translateY(0) translateX(0) scale(0);
      opacity: 0;
    }
    10% {
      opacity: 0.8;
      transform: translateY(-30px) translateX(5px) scale(1);
    }
    50% {
      opacity: 0.6;
      transform: translateY(-120px) translateX(-10px) scale(0.8);
    }
    90% {
      opacity: 0.1;
    }
    100% {
      transform: translateY(-250px) translateX(15px) scale(0.3);
      opacity: 0;
    }
  }

  /* === TEXT CONTAINER === */
  .text-container {
    position: absolute;
    width: 85%;
    max-width: 600px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }

  .verse {
    font-size: clamp(0.85rem, 2.2vmin, 1.3rem);
    color: rgba(255, 245, 230, 0.95);
    line-height: 1.9;
    text-shadow: 0 0 20px rgba(255, 200, 100, 0.3),
                 0 2px 4px rgba(0, 0, 0, 0.5);
    opacity: 0;
    animation: textFadeIn 2s ease forwards;
    margin-bottom: 0.5em;
    letter-spacing: 0.05em;
  }

  .verse:nth-child(1) { animation-delay: 2s; }
  .verse:nth-child(2) { animation-delay: 5s; }
  .verse:nth-child(3) { animation-delay: 9s; }
  .verse:nth-child(4) { animation-delay: 13s; }
  .verse:nth-child(5) { animation-delay: 17s; }
  .verse:nth-child(6) { animation-delay: 21s; }
  .verse:nth-child(7) { animation-delay: 25s; }

  .verse-ref {
    font-size: clamp(0.7rem, 1.6vmin, 0.9rem);
    color: rgba(255, 200, 130, 0.7);
    display: block;
    margin-top: 2px;
    font-style: italic;
  }

  .verse-highlight {
    color: rgba(255, 230, 170, 1);
    font-weight: 700;
    text-shadow: 0 0 30px rgba(255, 200, 100, 0.5),
                 0 0 60px rgba(255, 180, 80, 0.2);
  }

  .amen-text {
    font-size: clamp(1.5rem, 4vmin, 2.5rem);
    color: rgba(255, 230, 170, 0.95);
    text-shadow: 0 0 30px rgba(255, 200, 100, 0.6),
                 0 0 60px rgba(255, 180, 80, 0.3);
    letter-spacing: 0.3em;
    margin-top: 1em;
  }

  @keyframes textFadeIn {
    0% { opacity: 0; transform: translateY(15px); filter: blur(4px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  /* === GLOW OVERLAY === */
  .glow-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: radial-gradient(ellipse at 50% 40%,
      rgba(255, 180, 80, 0.08) 0%,
      transparent 60%
    );
    animation: glowPulse 6s ease-in-out infinite;
    z-index: 3;
    pointer-events: none;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* === LIGHT BEAM FROM HEAVEN === */
  .light-beam {
    position: absolute;
    top: -5%;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-top: 55vh solid rgba(255, 220, 150, 0.06);
    z-index: 4;
    animation: beamPulse 6s ease-in-out infinite;
    filter: blur(2px);
  }

  .light-beam::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-top: 45vh solid rgba(255, 240, 200, 0.04);
  }

  @keyframes beamPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* === SMALL CHURCH SILHOUETTE === */
  .church {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
  }

  .church-body {
    width: 40px;
    height: 25px;
    background: #0d0d2a;
    border-radius: 2px;
    position: relative;
  }

  .church-roof {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-bottom: 20px solid #0d0d2a;
  }

  .church-steeple {
    position: absolute;
    bottom: 45px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 15px;
    background: #0d0d2a;
    border-radius: 1px 1px 0 0;
  }

  .church-steeple::before {
    content: '';
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 6px;
    background: rgba(255, 200, 100, 0.6);
    box-shadow: 0 0 5px rgba(255, 200, 100, 0.4);
  }

  /* === SHIMMERING TEXT BORDER === */
  .text-border {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 88%;
    max-width: 650px;
    height: auto;
    min-height: 60%;
    border: 1px solid rgba(255, 200, 100, 0.1);
    border-radius: 8px;
    z-index: 15;
    pointer-events: none;
    animation: borderGlow 6s ease-in-out infinite;
  }

  @keyframes borderGlow {
    0%, 100% { border-color: rgba(255, 200, 100, 0.05); box-shadow: none; }
    50% { border-color: rgba(255, 200, 100, 0.15); box-shadow: 0 0 30px rgba(255, 200, 100, 0.05), inset 0 0 30px rgba(255, 200, 100, 0.02); }
  }

  /* === RESPONSIVE TEXT ADJUSTMENTS === */
  @media (max-width: 500px) {
    .text-container {
      width: 90%;
    }
    .verse {
      line-height: 1.8;
    }
  }

  /* === HEART PARTICLE === */
  .heart-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255, 180, 180, 0.4);
    transform: rotate(45deg);
    animation: heartFloat 10s ease-in-out infinite;
    z-index: 6;
  }

  .heart-particle::before,
  .heart-particle::after {
    content: '';
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255, 180, 180, 0.4);
    border-radius: 50%;
  }

  .heart-particle::before { top: -3px; left: 0; }
  .heart-particle::after { left: 3px; top: 0; }

  .heart-particle:nth-child(1) { left: 25%; bottom: 30%; animation-delay: 0s; animation-duration: 12s; }
  .heart-particle:nth-child(2) { left: 60%; bottom: 25%; animation-delay: 3s; animation-duration: 14s; }
  .heart-particle:nth-child(3) { left: 40%; bottom: 35%; animation-delay: 6s; animation-duration: 11s; }

  @keyframes heartFloat {
    0% { transform: rotate(45deg) translateY(0) scale(0); opacity: 0; }
    20% { opacity: 0.6; transform: rotate(45deg) translateY(-40px) scale(1); }
    80% { opacity: 0.2; }
    100% { transform: rotate(45deg) translateY(-180px) scale(0.5); opacity: 0; }
  }

  /* === CIRCLE OF PEACE === */
  .peace-circle {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    border: 1px solid rgba(255, 200, 100, 0.08);
    border-radius: 50%;
    z-index: 9;
    animation: peacePulse 6s ease-in-out infinite;
  }

  .peace-circle::before {
    content: '';
    position: absolute;
    top: -10px;
    left: -10px;
    right: -10px;
    bottom: -10px;
    border: 1px solid rgba(255, 200, 100, 0.04);
    border-radius: 50%;
  }

  @keyframes peacePulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.08); opacity: 0.8; }
  }

  /* === TITLE === */
  .title {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.9rem, 2.5vmin, 1.4rem);
    color: rgba(255, 220, 170, 0.8);
    letter-spacing: 0.2em;
    z-index: 20;
    text-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
    animation: titleFade 3s ease forwards;
    animation-delay: 0.5s;
    opacity: 0;
    white-space: nowrap;
  }

  @keyframes titleFade {
    0% { opacity: 0; letter-spacing: 0.5em; }
    100% { opacity: 1; letter-spacing: 0.2em; }
  }
</style>
